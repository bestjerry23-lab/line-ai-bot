<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>貝拉現場採購</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#FDF8F3;--warm:#F5EDE0;--brown:#8B6343;--brown-light:#C9956A;
  --brown-dark:#5C3D1E;--green:#4CAF7D;--green-bg:#E8F5EE;
  --red:#E05C5C;--red-bg:#FDE8E8;--amber:#E8A030;--amber-bg:#FDF0DC;
  --blue:#5B8DEF;--blue-bg:#EBF1FF;--purple:#7C3AED;--purple-bg:#F0E8FF;
  --text:#2C1810;--text-muted:#8B7355;--border:#E8D9C8;
  --card:#FFFFFF;--shadow:0 2px 12px rgba(139,99,67,0.08);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;padding-bottom:40px;-webkit-font-smoothing:antialiased}
.header{background:var(--brown);padding:14px 20px;position:sticky;top:0;z-index:100}
.header-title{font-size:17px;font-weight:700;color:white}
.header-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px}
.tab-bar{background:white;border-bottom:1px solid var(--border);display:flex}
.tab-btn{flex:1;padding:11px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all 0.2s}
.tab-btn.active{color:var(--brown);border-bottom-color:var(--brown);font-weight:700}
.content{padding:14px}
.section-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--brown-dark);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:10px}
.form-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:white;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--brown)}
.form-row-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:var(--brown);border:none;color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;transition:opacity 0.2s}
.btn-primary:disabled{opacity:0.6}
.btn-secondary{width:100%;padding:11px;border-radius:12px;background:var(--warm);border:1px solid var(--border);color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border-radius:10px;background:white;border:1.5px dashed var(--border);color:var(--brown);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:6px}

/* 品牌區塊 */
.brand-block{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.brand-header{background:var(--warm);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.brand-name-input{flex:1;border:none;background:none;font-size:14px;font-weight:700;color:white;font-family:inherit;outline:none}
.brand-name-input::placeholder{color:rgba(255,255,255,0.6);font-weight:400}
.brand-count{font-size:11px;color:var(--text-muted);margin-right:8px}
.brand-remove{background:var(--red-bg);border:none;color:var(--red);font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;font-family:inherit}
.brand-body{padding:10px 12px}
.product-row{display:grid;grid-template-columns:2fr 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:6px}
.product-row input{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:white;outline:none;width:100%}
.product-row input:focus{border-color:var(--brown)}
.row-remove{width:28px;height:28px;border-radius:8px;background:var(--red-bg);border:none;color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.col-labels{display:grid;grid-template-columns:2fr 1fr 1fr 28px;gap:6px;margin-bottom:4px}
.col-label{font-size:10px;color:var(--text-muted);font-weight:500;padding:0 2px}

/* 待訂 */
.waiting-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:white;border-radius:10px;border:1.5px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.waiting-item.selected{border-color:var(--brown);background:#FFFAF5}
.w-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;transition:all 0.15s}
.waiting-item.selected .w-check{background:var(--brown);border-color:var(--brown)}
.w-info{flex:1;min-width:0}
.w-name{font-size:13px;font-weight:600;color:var(--brown-dark)}
.w-product{font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-meta{font-size:10px;color:var(--text-muted);margin-top:1px}
.w-price{font-size:13px;font-weight:700;color:var(--brown);flex-shrink:0}

/* 照片 */
.photo-area{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;background:white;transition:all 0.2s}
.photo-area.has-photos{border-style:solid;border-color:var(--green);background:var(--green-bg)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);border:none;color:white;width:18px;height:18px;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 總覽圖表 */
.overview-summary{background:var(--brown);border-radius:14px;padding:16px;margin-bottom:12px;color:white}
.overview-total{font-size:28px;font-weight:700;margin-bottom:4px}
.overview-meta{font-size:12px;color:rgba(255,255,255,0.6)}
.chart-wrap{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px}
.chart-title{font-size:13px;font-weight:700;color:var(--brown-dark);margin-bottom:12px}
.bar-item{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bar-brand{font-size:12px;font-weight:600;color:var(--brown-dark)}
.bar-amount{font-size:12px;font-weight:700;color:var(--brown)}
.bar-track{height:8px;background:var(--warm);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
.bar-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.brand-detail-card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.brand-detail-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.brand-detail-name{font-size:13px;font-weight:700;color:var(--brown-dark)}
.brand-detail-total{font-size:13px;font-weight:700;color:var(--brown)}
.brand-detail-row{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:12px}
.brand-detail-row:last-child{border-bottom:none}
.filter-row{display:flex;gap:6px;margin-bottom:12px}
.filter-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;font-family:inherit}
.filter-chip.active{background:var(--brown);border-color:var(--brown);color:white}

/* 確認摘要 */
.confirm-brand{background:var(--warm);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.confirm-brand-name{font-size:13px;font-weight:700;color:var(--brown-dark);margin-bottom:6px}
.confirm-item{font-size:12px;color:var(--text);padding:3px 0;display:flex;justify-content:space-between}

/* Toast & Loading */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brown);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:400}
.loading-overlay.show{display:flex}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--brown);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--warm);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.search-input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:none}
.success-screen{text-align:center;padding:40px 20px;display:none}
.result-list{background:white;border-radius:14px;padding:14px;border:1px solid var(--border);text-align:left;margin-bottom:16px;max-height:300px;overflow-y:auto}
.result-item{font-size:12px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border)}
.result-item:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🛍️ 貝拉現場採購</div>
  <div class="header-sub">韓國現場採購記錄系統</div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tab-new" onclick="switchTab('new')">📦 新增採購</button>
  <button class="tab-btn" id="tab-waiting" onclick="switchTab('waiting')">📝 配對待訂</button>
  <button class="tab-btn" id="tab-overview" onclick="switchTab('overview')">📊 採購總覽</button>
</div>

<!-- 新增採購 -->
<div id="view-new" class="content">
  <div class="section-card">
    <div class="section-title">📅 採購資訊</div>
    <div class="form-row-3">
      <div class="form-group"><label class="form-label">採購日期</label><input class="form-input" type="date" id="purchase-date"></div>
      <div class="form-group"><label class="form-label">匯率（台幣:韓元）</label><input class="form-input" type="number" id="exchange-rate" placeholder="46.1" step="0.1" value="46.1"></div>
      <div class="form-group"><label class="form-label">備註</label><input class="form-input" id="purchase-note" placeholder="選填"></div>
    </div>
  </div>

  <div id="brands-container"></div>
  <button class="btn-add" onclick="addBrand()">🏷️ 新增品牌</button>

  <!-- 照片上傳 -->
  <div class="section-card" style="margin-top:12px">
    <div class="section-title">📸 上傳收據/商品照片</div>
    <div class="photo-area" id="photo-area" onclick="document.getElementById('photo-input').click()">
      <div style="font-size:28px;margin-bottom:6px">📷</div>
      <div style="font-size:13px;color:var(--text-muted)" id="photo-text">點擊上傳照片（選填）</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <button class="btn-primary" onclick="submitPurchase()" id="submit-btn">🚀 送出採購記錄</button>

  <!-- 成功畫面 -->
  <div class="success-screen" id="success-screen">
    <div style="font-size:56px;margin-bottom:12px">🎉</div>
    <div style="font-size:18px;font-weight:700;color:var(--brown-dark);margin-bottom:6px">採購記錄完成！</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">所有資料已成功寫入系統</div>
    <div class="result-list" id="result-list"></div>
    <button class="btn-primary" onclick="resetForm()">📦 繼續新增採購</button>
  </div>
</div>

<!-- 配對待訂 -->
<div id="view-waiting" style="display:none" class="content">
  <div class="section-card">
    <div class="section-title">📝 選擇待訂轉訂單</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">勾選採購到的商品對應的待訂，點擊送出後自動轉為正式訂單</div>
    <div class="search-bar">
      <span style="color:var(--text-muted)">🔍</span>
      <input class="search-input" placeholder="搜尋顧客或商品..." id="waiting-search" oninput="filterWaiting()">
      <button onclick="document.getElementById('waiting-search').value='';filterWaiting()" style="border:none;background:none;color:var(--text-muted);cursor:pointer">✕</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <button onclick="selectAllWaiting()" style="font-size:11px;color:var(--brown);background:none;border:none;cursor:pointer;font-family:inherit">全選</button>
      <span id="waiting-selected-count" style="font-size:12px;color:var(--text-muted)"></span>
      <button onclick="clearAllWaiting()" style="font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:inherit">清除</button>
    </div>
    <div id="waiting-list"><div style="text-align:center;padding:20px;color:var(--text-muted)">載入中...</div></div>
  </div>
  <button class="btn-primary" id="convert-btn" onclick="convertWaiting()" style="display:none">✅ 批次轉為正式訂單</button>
</div>

<!-- 採購總覽 -->
<div id="view-overview" style="display:none" class="content">
  <div class="section-card">
    <div class="section-title">📅 查詢期間</div>
    <div class="filter-row">
      <button class="filter-chip active" id="range-today" onclick="setRange('today')">今天</button>
      <button class="filter-chip" id="range-week" onclick="setRange('week')">本週</button>
      <button class="filter-chip" id="range-month" onclick="setRange('month')">本月</button>
      <button class="filter-chip" id="range-custom" onclick="setRange('custom')">自訂</button>
    </div>
    <div id="custom-range" style="display:none">
      <div class="form-row-3" style="grid-template-columns:1fr 1fr">
        <div class="form-group"><label class="form-label">開始</label><input class="form-input" type="date" id="overview-start"></div>
        <div class="form-group"><label class="form-label">結束</label><input class="form-input" type="date" id="overview-end"></div>
      </div>
    </div>
    <button class="btn-primary" onclick="loadOverview()" style="margin-top:4px">🔍 查詢</button>
  </div>
  <div id="overview-result"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div style="font-size:14px;color:var(--brown-dark);font-weight:500" id="loading-text">處理中...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1thsiQXBS2oSIoJGsqfP9O5UGkIZ4q6hJSL2D_PHArxnAAJeABZOz_yOM_OF6dORp/exec';
const DRIVE_FOLDER_ID = '1OrvP1fDzGZTbNcuyP0GHvXzW3CfXGPiI';
const VENDOR_NAME = '韓國現場採購';

let cbCount = 0;
let photos = [];
let waitingList = [];
let selectedWaiting = new Set();
let brandCount = 0;
let currentRange = 'today';

// 初始化
window.onload = () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('purchase-date').value = today;
  addBrand();
  setRange('today');
};

// ===== 工具函式 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showLoading(text = '處理中...') {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

function callScript(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb' + (++cbCount);
    const timeout = setTimeout(() => { delete window[cbName]; reject(new Error('timeout')); }, 20000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };
    const body = encodeURIComponent(JSON.stringify({action, ...params}));
    const script = document.createElement('script');
    script.id = cbName;
    script.src = SCRIPT_URL + '?callback=' + cbName + '&body=' + body;
    script.onerror = () => { clearTimeout(timeout); reject(new Error('error')); };
    document.head.appendChild(script);
  });
}

// ===== Tab 切換 =====
function switchTab(tab) {
  ['new','waiting','overview'].forEach(t => {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'waiting' && !waitingList.length) loadWaiting();
  if (tab === 'overview') setRange(currentRange);
  window.scrollTo(0,0);
}

// ===== 品牌管理 =====
const BRAND_COLORS = ['#5C3D1E','#4CAF7D','#5B8DEF','#7C3AED','#E8A030','#E05C5C','#2C9E8F','#C45AB3'];

function addBrand() {
  brandCount++;
  const id = 'brand-' + brandCount;
  const num = brandCount;
  const color = BRAND_COLORS[(num-1) % BRAND_COLORS.length];
  const div = document.createElement('div');
  div.className = 'brand-block';
  div.id = id;
  div.innerHTML = `
    <div style="background:${color};padding:8px 14px;display:flex;align-items:center;gap:6px">
      <span style="color:white;font-size:11px;font-weight:600;white-space:nowrap">🏷️ 品牌</span>
      <input class="brand-name-input" placeholder="輸入品牌名稱，例：Dior、MAC、Rhode" id="brand-name-${num}" style="color:white;font-size:14px">
      <span class="brand-count" id="brand-count-${num}" style="color:rgba(255,255,255,0.7)">0 項</span>
      ${num > 1 ? `<button class="brand-remove" onclick="document.getElementById('${id}').remove();updateBrandCounts()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer">✕</button>` : ''}
    </div>
    <div class="brand-body">
      <div class="col-labels">
        <span class="col-label">商品名稱</span>
        <span class="col-label">成本(NT$)</span>
        <span class="col-label">數量</span>
        <span class="col-label"></span>
      </div>
      <div id="rows-${num}"></div>
      <button class="btn-add" onclick="addRow(${num})">+ 新增商品</button>
    </div>`;
  document.getElementById('brands-container').appendChild(div);
  addRow(num);
}

function addRow(brandNum) {
  const container = document.getElementById('rows-' + brandNum);
  if (!container) return;
  const rowId = 'row-' + brandNum + '-' + Date.now();
  const div = document.createElement('div');
  div.className = 'product-row';
  div.id = rowId;
  div.innerHTML = `
    <input type="text" placeholder="商品名稱" class="row-name" oninput="updateBrandCounts()">
    <input type="number" placeholder="0" class="row-cost" min="0">
    <input type="number" placeholder="1" class="row-qty" min="1" value="1">
    <button class="row-remove" onclick="document.getElementById('${rowId}').remove();updateBrandCounts()">✕</button>`;
  container.appendChild(div);
  div.querySelector('.row-name').focus();
  updateBrandCounts();
}

function updateBrandCounts() {
  document.querySelectorAll('.brand-block').forEach(block => {
    const num = block.id.replace('brand-','');
    const count = block.querySelectorAll('.row-name');
    const filled = Array.from(count).filter(n => n.value.trim()).length;
    const countEl = document.getElementById('brand-count-' + num);
    if (countEl) countEl.textContent = filled + ' 項';
  });
}

function getBrands() {
  const brands = [];
  document.querySelectorAll('.brand-block').forEach(block => {
    const num = block.id.replace('brand-','');
    const nameEl = document.getElementById('brand-name-' + num);
    const brandName = nameEl?.value.trim() || '未命名品牌';
    const products = [];
    block.querySelectorAll('.product-row').forEach(row => {
      const name = row.querySelector('.row-name')?.value.trim();
      const cost = Number(row.querySelector('.row-cost')?.value) || 0;
      const qty = Number(row.querySelector('.row-qty')?.value) || 1;
      if (name) products.push({name, cost, qty});
    });
    if (products.length) brands.push({brandName, products});
  });
  return brands;
}

// ===== 照片 =====
function handlePhotos(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      photos.push({file, base64: e.target.result, name: file.name});
      renderPhotos();
    };
    reader.readAsDataURL(file);
  });
}
function renderPhotos() {
  const area = document.getElementById('photo-area');
  const grid = document.getElementById('photo-grid');
  area.classList.toggle('has-photos', photos.length > 0);
  document.getElementById('photo-text').textContent = photos.length > 0 ? `已選 ${photos.length} 張` : '點擊上傳照片（選填）';
  grid.innerHTML = photos.map((p,i) => `
    <div class="photo-thumb">
      <img src="${p.base64}">
      <button class="photo-del" onclick="photos.splice(${i},1);renderPhotos()">✕</button>
    </div>`).join('');
}

// ===== 送出採購 =====
async function submitPurchase() {
  const brands = getBrands();
  if (!brands.length) { showToast('❌ 請至少填入一個品牌和商品'); return; }
  const date = document.getElementById('purchase-date').value;
  const rate = document.getElementById('exchange-rate').value;
  const note = document.getElementById('purchase-note').value;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '⏳ 送出中...';

  const results = [], errors = [];
  showLoading('寫入採購記錄...');

  try {
    // 寫入廠商工作表（統一韓國現場採購）
    for (const brand of brands) {
      for (const p of brand.products) {
        try {
          await callScript('vendorOrder', {
            vendorName: VENDOR_NAME,
            product: `【${brand.brandName}】${p.name}`,
            cost: p.cost,
            qty: p.qty,
            type: '補庫存',
            note: `匯率:1台幣=${rate}韓元 ${note}`.trim()
          });
          results.push(`✅ ${brand.brandName} — ${p.name} × ${p.qty}`);
        } catch(e) {
          errors.push(`❌ ${p.name} 寫入失敗`);
        }
      }
    }

    // 上傳照片
    if (photos.length > 0) {
      for (let i = 0; i < photos.length; i++) {
        showLoading(`上傳照片 ${i+1}/${photos.length}...`);
        try {
          const base64Data = photos[i].base64.split(',')[1];
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              action: 'uploadPhoto',
              fileName: `${date}_韓國採購_${photos[i].name}`,
              base64: base64Data,
              mimeType: photos[i].file.type,
              folderId: DRIVE_FOLDER_ID
            })
          });
          results.push(`📸 ${photos[i].name} 已上傳`);
        } catch(e) {
          errors.push(`❌ 照片上傳失敗`);
        }
      }
    }

    hideLoading();
    btn.style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('result-list').innerHTML = [
      ...results.map(r => `<div class="result-item">${r}</div>`),
      ...errors.map(e => `<div class="result-item" style="color:var(--red)">${e}</div>`)
    ].join('');
  } catch(e) {
    hideLoading();
    showToast('❌ 送出失敗');
    btn.disabled = false; btn.textContent = '🚀 送出採購記錄';
  }
}

function resetForm() {
  document.getElementById('brands-container').innerHTML = '';
  photos = [];
  brandCount = 0;
  document.getElementById('photo-grid').innerHTML = '';
  document.getElementById('photo-area').classList.remove('has-photos');
  document.getElementById('photo-text').textContent = '點擊上傳照片（選填）';
  document.getElementById('purchase-note').value = '';
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '🚀 送出採購記錄';
  document.getElementById('success-screen').style.display = 'none';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('purchase-date').value = today;
  addBrand();
  window.scrollTo(0,0);
}

// ===== 待訂配對 =====
async function loadWaiting() {
  document.getElementById('waiting-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">載入中...</div>';
  try {
    const result = await callScript('getWaiting', {});
    waitingList = result.list || [];
    filterWaiting();
  } catch(e) {
    document.getElementById('waiting-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">載入失敗</div>';
  }
}

function filterWaiting() {
  const kw = (document.getElementById('waiting-search')?.value || '').toLowerCase();
  const filtered = kw ? waitingList.filter(w =>
    (w.customer||'').toLowerCase().includes(kw) ||
    (w.product||'').toLowerCase().includes(kw)
  ) : waitingList;

  if (!filtered.length) {
    document.getElementById('waiting-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">找不到相符的待訂</div>';
    return;
  }

  document.getElementById('waiting-list').innerHTML = filtered.map(w => {
    const sel = selectedWaiting.has(w.id);
    return `<div class="waiting-item ${sel?'selected':''}" onclick="toggleW('${w.id}')">
      <div class="w-check">${sel?'✓':''}</div>
      <div class="w-info">
        <div class="w-name">${w.customer}</div>
        <div class="w-product">${w.product}</div>
        <div class="w-meta">${w.id} ｜ ${w.paymentStatus==='已付款'?'💳 已付款':'⏳ 未付款'}</div>
      </div>
      <div class="w-price">NT$${Number(w.price||0).toLocaleString()}</div>
    </div>`;
  }).join('');
  updateWCount();
}

function toggleW(id) {
  if (selectedWaiting.has(id)) selectedWaiting.delete(id);
  else selectedWaiting.add(id);
  filterWaiting();
}
function selectAllWaiting() {
  waitingList.forEach(w => selectedWaiting.add(w.id));
  filterWaiting();
}
function clearAllWaiting() {
  selectedWaiting.clear();
  filterWaiting();
}
function updateWCount() {
  const cnt = selectedWaiting.size;
  document.getElementById('waiting-selected-count').textContent = cnt > 0 ? `已選 ${cnt} 筆` : '';
  document.getElementById('convert-btn').style.display = cnt > 0 ? 'block' : 'none';
}

async function convertWaiting() {
  if (!selectedWaiting.size) return;
  if (!confirm(`確定將 ${selectedWaiting.size} 筆待訂轉為正式訂單？`)) return;
  showLoading('轉換中...');
  try {
    const result = await callScript('batchConvertWaiting', { waitIds: [...selectedWaiting] });
    hideLoading();
    const success = result.results?.length || 0;
    showToast(`✅ 成功轉換 ${success} 筆訂單！`);
    selectedWaiting.clear();
    waitingList = [];
    await loadWaiting();
  } catch(e) {
    hideLoading();
    showToast('❌ 轉換失敗');
  }
}

// ===== 採購總覽 =====
function setRange(range) {
  currentRange = range;
  ['today','week','month','custom'].forEach(r => {
    document.getElementById('range-' + r)?.classList.toggle('active', r === range);
  });
  document.getElementById('custom-range').style.display = range === 'custom' ? 'block' : 'none';
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  if (range === 'today') {
    document.getElementById('overview-start').value = fmt(today);
    document.getElementById('overview-end').value = fmt(today);
  } else if (range === 'week') {
    const day = today.getDay();
    const mon = new Date(today);
    mon.setDate(today.getDate() - (day===0?6:day-1));
    document.getElementById('overview-start').value = fmt(mon);
    document.getElementById('overview-end').value = fmt(today);
  } else if (range === 'month') {
    document.getElementById('overview-start').value = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
    document.getElementById('overview-end').value = fmt(today);
  }
}

const BAR_COLORS = ['#8B6343','#4CAF7D','#5B8DEF','#9B72CF','#E8A030','#E07070','#3AADA0'];

async function loadOverview() {
  const startDate = document.getElementById('overview-start').value;
  const endDate = document.getElementById('overview-end').value;
  if (!startDate || !endDate) { showToast('❌ 請選擇日期範圍'); return; }
  const resultEl = document.getElementById('overview-result');
  resultEl.innerHTML = '';
  showLoading('查詢採購記錄...');

  try {
    const result = await callScript('getVendorOrders', { vendorName: VENDOR_NAME, status: 'all' });
    const orders = (result.orders || []).filter(o => {
      const d = String(o.date).substring(0, 10);
      return d >= startDate && d <= endDate;
    });
    hideLoading();

    if (!orders.length) {
      resultEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted)">📭 此期間沒有採購記錄</div>';
      return;
    }

    // 按品牌分組（商品名稱格式：【品牌】商品）
    const brandData = {};
    orders.forEach(o => {
      const match = (o.product||'').match(/^【(.+?)】(.+)/);
      const brand = match ? match[1] : '其他';
      const product = match ? match[2] : (o.product||'');
      if (!brandData[brand]) brandData[brand] = [];
      brandData[brand].push({...o, displayName: product});
    });

    const totalCost = orders.reduce((s,o) => s + Number(o.cost||0) * Number(o.qty||1), 0);
    const totalItems = orders.length;
    const brandNames = Object.keys(brandData);

    // 總覽摘要
    let html = `<div class="overview-summary">
      <div class="overview-total">NT$${totalCost.toLocaleString()}</div>
      <div class="overview-meta">${startDate} ～ ${endDate} ｜ ${brandNames.length} 品牌 ｜ ${totalItems} 項商品</div>
    </div>`;

    // 品牌長條圖
    html += `<div class="chart-wrap"><div class="chart-title">📊 各品牌採購金額</div>`;
    const maxVal = Math.max(...brandNames.map(b => brandData[b].reduce((s,o) => s + Number(o.cost||0)*Number(o.qty||1), 0)));
    brandNames.forEach((brand, i) => {
      const bTotal = brandData[brand].reduce((s,o) => s + Number(o.cost||0)*Number(o.qty||1), 0);
      const bCount = brandData[brand].length;
      const pct = Math.round(bTotal/totalCost*100);
      const barW = Math.round(bTotal/maxVal*100);
      const color = BAR_COLORS[i % BAR_COLORS.length];
      html += `<div class="bar-item">
        <div class="bar-label">
          <span class="bar-brand" style="color:${color}">● ${brand}</span>
          <span class="bar-amount">NT$${bTotal.toLocaleString()} <span style="font-size:10px;color:var(--text-muted)">${pct}%</span></span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${color}"></div></div>
        <div class="bar-sub">${bCount} 項商品</div>
      </div>`;
    });
    html += '</div>';

    // 各品牌明細
    brandNames.forEach((brand, i) => {
      const color = BAR_COLORS[i % BAR_COLORS.length];
      const bTotal = brandData[brand].reduce((s,o) => s + Number(o.cost||0)*Number(o.qty||1), 0);
      html += `<div class="brand-detail-card">
        <div class="brand-detail-header" style="border-left:4px solid ${color}">
          <div class="brand-detail-name">🏷️ ${brand}</div>
          <div class="brand-detail-total">NT$${bTotal.toLocaleString()}</div>
        </div>
        ${brandData[brand].map(o => `
          <div class="brand-detail-row">
            <div>
              <div style="font-weight:500">${o.displayName}</div>
              <div style="font-size:10px;color:var(--text-muted)">${String(o.date).substring(0,10)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:var(--brown)">NT$${(Number(o.cost||0)*Number(o.qty||1)).toLocaleString()}</div>
              <div style="font-size:10px;color:var(--text-muted)">NT$${Number(o.cost||0).toLocaleString()} × ${o.qty||1}</div>
            </div>
          </div>`).join('')}
      </div>`;
    });

    resultEl.innerHTML = html;

    // 動畫
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(b => {
        const w = b.style.width;
        b.style.width = '0';
        setTimeout(() => b.style.width = w, 50);
      });
    }, 100);

  } catch(e) {
    hideLoading();
    resultEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--red)">❌ 查詢失敗</div>';
  }
}
</script>
